version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      AIRFLOW_DB: ${AIRFLOW_DB:-airflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - ./servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres

  airflow-webserver:
    build: .
    container_name: airflow-webserver
    user: "${AIRFLOW_UID:-50000}:0"
    command: webserver
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres/${AIRFLOW_DB:-airflow}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=''
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW_CONN_POSTGRES_DEFAULT=postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-ecommerce}
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dbt_project:/opt/airflow/dbt_project
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build: .
    container_name: airflow-scheduler
    user: "${AIRFLOW_UID:-50000}:0"
    command: scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres/${AIRFLOW_DB:-airflow}
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW_CONN_POSTGRES_DEFAULT=postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-ecommerce}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dbt_project:/opt/airflow/dbt_project
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    build: .
    container_name: airflow-init
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres/${AIRFLOW_DB:-airflow}
      - AIRFLOW_CONN_POSTGRES_DEFAULT=postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-ecommerce}
      - AIRFLOW_USERNAME=${AIRFLOW_USERNAME:-admin}
      - AIRFLOW_PASSWORD=${AIRFLOW_PASSWORD:-admin}
      - AIRFLOW_FIRSTNAME=${AIRFLOW_FIRSTNAME:-admin}
      - AIRFLOW_LASTNAME=${AIRFLOW_LASTNAME:-admin}
      - AIRFLOW_EMAIL=${AIRFLOW_EMAIL:-admin@admin.com}
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username $${AIRFLOW_USERNAME:-admin}
      --firstname $${AIRFLOW_FIRSTNAME:-admin}
      --lastname $${AIRFLOW_LASTNAME:-admin}
      --role Admin
      --email $${AIRFLOW_EMAIL:-admin@admin.com}
      --password $${AIRFLOW_PASSWORD:-admin}"
    depends_on:
      - postgres

  jupyter:
    build: .
    container_name: jupyter
    user: "${AIRFLOW_UID:-50000}:0"
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --NotebookApp.token='' --NotebookApp.password=''
    environment:
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres/${AIRFLOW_DB:-airflow}
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/opt/airflow/notebooks
      - ./data:/opt/airflow/data
      - ./dbt_project:/opt/airflow/dbt_project
    depends_on:
      - postgres

volumes:
  postgres_data:
